{% extends "base.html" %}

{% block extrahead %}
{{ super() }}
<script>
    (() => {
        const styles = ["mono", "serif", "modern"];
        const sizes = ["auto", "small", "medium", "large"];
        let style;
        let size;

        try {
            style = localStorage.getItem("xnano-style");
            size = localStorage.getItem("xnano-text-size");
        } catch (_) {
            style = null;
            size = null;
        }

        document.documentElement.dataset.xnanoStyle = styles.includes(style)
            ? style
            : "mono";
        document.documentElement.dataset.xnanoSize = sizes.includes(size)
            ? size
            : "auto";
    })();
</script>
{% endblock %}

{% block announce %}
<script>
    // Context7 creates a closed shadow root. Keep the reference returned at
    // creation time so our own stylesheet can be appended after widget.js.
    (() => {
        const context7Shadow = Symbol.for("xnano.context7Shadow");
        const attachShadow = Element.prototype.attachShadow;

        Element.prototype.attachShadow = function (options) {
            const shadowRoot = attachShadow.call(this, options);

            if (this.id === "context7-widget") {
                window[context7Shadow] = shadowRoot;
            }

            return shadowRoot;
        };
    })();
</script>
<script src="https://context7.com/widget.js" data-library="/hsaeed3/xnano" data-color="#5e6f96"></script>

<p style="text-align: center">
    Run & edit examples directly in your browser using the live sandbox: <a href="/sandbox">/xnano/sandbox/</a>
</p>
{% endblock %}
