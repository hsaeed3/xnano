[project.theme]
custom_dir = "docs/overrides"
language = "en"
features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "header.autohide",
    "navigation.footer",
    # "navigation.instant",
    # !! prefetch should probably be enabled but its messing up the hero
    # !! animation on reloads from other pages
    # "navigation.instant.prefetch",
    "navigation.instant.progress",
    "navigation.path",
    # "navigation.prune",
    # "navigation.tabs",
    "navigation.top",
    "navigation.sections",
    "navigation.tracking",
    "search.highlight",
    "toc.follow",
]

[project.theme.icon]
logo = "lucide/smile"
repo = "lucide/smile"

[[project.theme.palette]]
scheme = "slate"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[project.theme.font]
text = "Geist Pixel"
code = "Iosevka Web"

[project.home]
tagline = "fun llm functions and assorted knick-knacks."
gradient_hsla = "hsla(0, 0%, 100%, 0)"
description = """
Declarative terminal interfaces in Python, powered by Rust.
"""

[[project.home.buttons]]
name = "Getting Started"
url = "concepts/getting-started"
theme = "md-button"

[[project.home.buttons]]
name = "API Reference"
url = "api"
theme = "md-button"

