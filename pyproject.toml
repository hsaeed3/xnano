[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
package = true

[tool.hatch.build.targets.wheel]
packages = ["xnano"]

[tool.hatch.build.targets.sdist]
exclude = ["/deprecated", "/docs", "/tests", "/examples"]

[tool.uv-dynamic-versioning]
vcs = "git"
style = "pep440"
bump = true

[project]
name = "xnano"
version = "0.0.60"
description = ""
authors = [{ name = "Hammad Saeed", email = "hvmmad@gmail.com" }]
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.9"
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
]

[dependency-groups]
dev = [
    # rust-based alternative to pre-commit hooks
    "prek",
    "logfire",
    "black",
    # SORT!
    "isort",
    "ruff",
    "uv",
    "pytest",
    "pytest-asyncio",
    "twine>=6.1.0",
    # astral.sh alternative to pyright / mypy
    # we are indeed common enjoyers of astral.sh products
    "ty",

    # docs (zensical is a project by the mkdocs-material team, that
    # aims to be the successor to mkdocs-material and mkdocs itself)
    "zensical",
    "mkdocstrings-python",
]

[tool.uv.build-backend]
source-exclude = ["/docs", "/tests"]
wheel-exclude = ["/docs"]

[tool.ruff]
line-length = 79
extend-exclude = ["/docs", "/deprecated"]

[tool.ty.src]
exclude = ["/docs", "/deprecated"]

[tool.ruff.format]
line-ending = "auto"
