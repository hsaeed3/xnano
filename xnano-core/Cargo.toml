[package]
name = "xnano-core"
version = "0.0.1"
edition = "2024"
license = "Apache-2.0"
readme = "README.md"
include = [
    "/pyproject.toml",
    "/README.md",
    "/LICENSE",
    "/.cargo",
    "/src",
]
rust-version = "1.88"

[lib]
name = "xnano_core"
crate-type = ["cdylib", "rlib"]
path = "rust/src/lib.rs"

[dependencies]
crossterm = "0.28"
palette = "0.7"
pyo3 = { version = "0.23", features = ["extension-module", "abi3-py310"] }
ratatui = { version = "0.29", features = ["palette", "underline-color"] }
ratatui-core = "0.1"
tachyonfx = "0.25"

[package.metadata.maturin]
name = "xnano_core"
python-source = "python/xnano_core"