extra_css = [
    "stylesheets/extras.css",
    "stylesheets/showcase-hover.css",
    "stylesheets/hero.css",
    "stylesheets/code-theme.css",
    "stylesheets/mkdocstrings.css",
    "stylesheets/components.css",
]

extra_javascript = [
    "js/code-lang.js",
    "js/custom.js",
    "js/showcase-hover.js",
    "js/hero.js",
    "https://unpkg.com/katex@0/dist/katex.min.js",
    "https://unpkg.com/katex@0/dist/contrib/auto-render.min.js",
    "https://unpkg.com/tablesort@5.3.0/dist/tablesort.min.js",
    "https://unpkg.com/papaparse@5/papaparse.min.js",
]

[project.theme]
custom_dir = "docs/overrides"
language = "en"
features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "header.autohide",
    "navigation.footer",
    # "navigation.instant",
    # !! prefetch should probably be enabled but its messing up the hero
    # !! animation on reloads from other pages
    # "navigation.instant.prefetch",
    "navigation.instant.progress",
    "navigation.path",
    # "navigation.prune",
    # "navigation.tabs",
    "navigation.top",
    "navigation.sections",
    "navigation.tracking",
    "search.highlight",
    "toc.follow",
]

[project.theme.icon]
logo = "lucide/smile"
repo = "lucide/smile"

[[project.theme.palette]]
scheme = "slate"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[project.theme.font]
text = "Geist Pixel"
code = "Iosevka Web"

[project.home]
tagline = "fun llm functions and assorted knick-knacks."
gradient_hsla = "hsla(0, 0%, 100%, 0)"
description = """
Declarative terminal interfaces in Python, powered by Rust.
"""

[[project.home.buttons]]
name = "Getting Started"
url = "concepts/getting-started"
theme = "md-button"

[[project.home.buttons]]
name = "API Reference"
url = "api"
theme = "md-button"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/hsaeed3/xnano"
name = "xnano - GitHub"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/xnano"
name = "xnano - PyPI"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/xnano-core"
name = "xnano-core - PyPI"

[[project.extra.social]]
icon = "fontawesome/brands/linkedin"
link = "https://www.linkedin.com/in/hsaeed3"
name = "Hammad Saeed - LinkedIn"

[project.markdown_extensions]
abbr = {}
admonition = {}
attr_list = {}
footnotes = {}
md_in_html = {}
"mkdocs-click" = {}
# Quoted key keeps the dotted module path (TOML nesting would break it).
"docs_extensions.interactive" = {}

[project.markdown_extensions.pymdownx]
critic = {}
details = {}
keys = {}
inlinehilite = {}

# Shared markdown fragments under docs/includes/ (e.g. interactive.md).
# Usage: --8<-- "interactive.md"
[project.markdown_extensions.pymdownx.snippets]
base_path = ["docs/includes"]

[project.markdown_extensions.pymdownx.arithmatex]
generic = true

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
auto_title = false

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "material.extensions.emoji.twemoji"
emoji_generator = "material.extensions.emoji.to_svg"

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.toc]
permalink = true
title = "On this page"
permalink_title = "Anchor link to this section for reference"

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
    { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.plugins.mkdocstrings.handlers.python]
inventories = ["https://docs.python.org/3/objects.inv"]
paths = ["lib/catalog", "lib/datautils", "lib/repack"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
inherited_members = true          # false
merge_init_into_class = true
parameter_headings = false
members_order = "source"
filters = ["!^_", "^__"]
heading_level = 2
separate_signature = true
docstring_section_style = "list"
backlinks = "tree"
show_root_heading = true
show_root_full_path = true
show_signature_annotations = true
show_source = true
show_symbol_type_heading = true
show_symbol_type_toc = true
show_root_toc_entry = false
signature_crossrefs = true
summary = true
unwrap_annotated = true

extensions = ["griffe_typingdoc"]

[project.plugins]

[project.plugins.search]

[project.markdown_extensions.termynal]
include_assets = true
title = "bash"
buttons = "macos"
prompt_literal_start = ["$"]

# markdown-exec: client-side Pyodide editors + optional build-time exec.
# Plugin auto-registers custom fences (incl. ``pyodide``) and injects assets.
# Pre-install packages in fences with: ```pyodide install="xnano"
# See https://pawamoy.github.io/markdown-exec/usage/pyodide/
[project.plugins.markdown-exec]
ansi = "auto"
