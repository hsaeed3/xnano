name: ci

on:
  push:
    branches:
      - main
    tags:
      - "xnano-core/**"
      - "xnano/**"
  pull_request: {}

env:
  COLUMNS: 150
  UV_PYTHON: "3.13"

jobs:
  resolve-release:
    name: resolve release plan
    runs-on: ubuntu-latest
    outputs:
      tag_package: ${{ steps.plan.outputs.tag_package }}
      tag_version: ${{ steps.plan.outputs.tag_version }}
      manifest_xnano_version: ${{ steps.plan.outputs.manifest_xnano_version }}
      manifest_core_version: ${{ steps.plan.outputs.manifest_core_version }}
      pinned_core_version: ${{ steps.plan.outputs.pinned_core_version }}
      pypi_xnano_latest: ${{ steps.plan.outputs.pypi_xnano_latest }}
      pypi_core_latest: ${{ steps.plan.outputs.pypi_core_latest }}
      pinned_core_on_pypi: ${{ steps.plan.outputs.pinned_core_on_pypi }}
      manifest_core_on_pypi: ${{ steps.plan.outputs.manifest_core_on_pypi }}
      manifest_xnano_on_pypi: ${{ steps.plan.outputs.manifest_xnano_on_pypi }}
      versions_unchanged: ${{ steps.plan.outputs.versions_unchanged }}
      tag_core_on_pypi: ${{ steps.plan.outputs.tag_core_on_pypi }}
      tag_xnano_on_pypi: ${{ steps.plan.outputs.tag_xnano_on_pypi }}
      run_workflow: ${{ steps.plan.outputs.run_workflow }}
      run_tests: ${{ steps.plan.outputs.run_tests }}
      run_core_pipeline: ${{ steps.plan.outputs.run_core_pipeline }}
      run_xnano_pipeline: ${{ steps.plan.outputs.run_xnano_pipeline }}
      use_workspace_core: ${{ steps.plan.outputs.use_workspace_core }}
      use_pypi_core: ${{ steps.plan.outputs.use_pypi_core }}
      should_publish_core: ${{ steps.plan.outputs.should_publish_core }}
      should_publish_xnano: ${{ steps.plan.outputs.should_publish_xnano }}
    steps:
      - uses: actions/checkout@v5

      - name: resolve release plan
        id: plan
        env:
          FULL_BUILD_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'Full Build') }}
        run: python3 .github/resolve_release_plan.py

  test-python:
    name: test ${{ matrix.python-version }}
    needs: resolve-release
    if: needs.resolve-release.outputs.run_tests == 'true'
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: install rust stable
        if: needs.resolve-release.outputs.use_workspace_core == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: cache rust
        if: needs.resolve-release.outputs.use_workspace_core == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: xnano-core

      - name: install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: install deps
        run: uv sync --group dev

      - name: install xnano-core from PyPI
        if: needs.resolve-release.outputs.use_pypi_core == 'true'
        run: >-
          uv pip install
          "xnano-core==${{ needs.resolve-release.outputs.pinned_core_version }}"

      - name: build workspace xnano-core
        if: needs.resolve-release.outputs.use_workspace_core == 'true'
        run: uv run maturin develop --uv
        working-directory: xnano-core
        env:
          RUST_BACKTRACE: 1

      - name: install xnano from repository
        run: uv pip install -e .
        env:
          RUST_BACKTRACE: 1

      - run: uv run pytest

  test-os:
    name: test on ${{ matrix.os }}
    needs: resolve-release
    if: needs.resolve-release.outputs.run_tests == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: install rust stable
        if: needs.resolve-release.outputs.use_workspace_core == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: cache rust
        if: needs.resolve-release.outputs.use_workspace_core == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: xnano-core

      - name: install uv
        uses: astral-sh/setup-uv@v7

      - name: install deps
        run: uv sync --group dev

      - name: install xnano-core from PyPI
        if: needs.resolve-release.outputs.use_pypi_core == 'true'
        run: >-
          uv pip install
          "xnano-core==${{ needs.resolve-release.outputs.pinned_core_version }}"

      - name: build workspace xnano-core
        if: needs.resolve-release.outputs.use_workspace_core == 'true'
        run: uv run maturin develop --uv
        working-directory: xnano-core
        env:
          RUST_BACKTRACE: 1

      - name: install xnano from repository
        run: uv pip install -e .
        env:
          RUST_BACKTRACE: 1

      - run: uv run pytest

  build-xnano-core-sdist:
    name: build xnano-core sdist
    needs: resolve-release
    if: needs.resolve-release.outputs.run_core_pipeline == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: xnano-core
          command: sdist
          args: --out dist
          rust-toolchain: stable
      - uses: actions/upload-artifact@v5
        with:
          name: pypi_files_xnano_core_sdist
          path: xnano-core/dist

  build-xnano-core-wheels:
    name: >-
      build xnano-core on ${{ matrix.os }}
      (${{ matrix.target || 'native' }}${{ matrix.manylinux && format(' - {0}', matrix.manylinux) || '' }})
    needs: resolve-release
    if: needs.resolve-release.outputs.run_core_pipeline == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runs-on: ubuntu-latest
            manylinux: auto
            target: x86_64
          - os: linux
            runs-on: ubuntu-latest
            manylinux: auto
            target: aarch64
          - os: linux
            runs-on: ubuntu-latest
            manylinux: musllinux_1_2
            target: x86_64
          - os: linux
            runs-on: ubuntu-latest
            manylinux: musllinux_1_2
            target: aarch64
          - os: macos
            runs-on: macos-latest
          - os: windows
            runs-on: windows-latest

    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v5

      - name: set up python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - run: pip install -U twine

      - name: build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: xnano-core
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist --interpreter 3.10
          rust-toolchain: stable

      - name: check wheels
        working-directory: xnano-core
        run: twine check --strict dist/*

      - uses: actions/upload-artifact@v5
        with:
          name: >-
            pypi_files_xnano_core_${{ matrix.os }}_${{ matrix.target || 'native' }}_${{ matrix.manylinux || 'none' }}
          path: xnano-core/dist

  test-xnano-core-wheel-install:
    name: test xnano-core wheel install on ${{ matrix.os }}
    needs: [resolve-release, build-xnano-core-wheels]
    if: needs.resolve-release.outputs.run_core_pipeline == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: install uv
        uses: astral-sh/setup-uv@v7

      - name: get dist artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: pypi_files_xnano_core_*
          merge-multiple: true
          path: dist

      - run: uv sync --frozen --group dev --no-install-project
      - run: >-
          uv pip install xnano-core --no-index --no-deps
          --find-links dist --force-reinstall
      - run: uv run --no-sync python -c "import xnano_core; print(xnano_core.__version__)"

  build-xnano-core-wasm:
    name: build xnano-core wasm (pyodide/emscripten)
    needs: resolve-release
    if: needs.resolve-release.outputs.run_core_pipeline == 'true'
    runs-on: ubuntu-latest

    env:
      # pyodide's xbuildenv pins this rust toolchain; must be >= xnano-core's
      # MSRV (1.88). As of the 314.x pyodide line this is a stable release,
      # so no nightly toolchain / wasm-eh sysroot workaround is needed.
      RUST_TOOLCHAIN: "1.93.0"

    steps:
      - uses: actions/checkout@v5

      - name: set up python
        uses: actions/setup-python@v6
        with:
          # must match `pyodide config get python_version`
          python-version: "3.14"

      - name: install pyodide-build
        run: pip install pyodide-build

      - name: install rust toolchain
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
          rustup target add wasm32-unknown-emscripten --toolchain "$RUST_TOOLCHAIN"

      - name: cache rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: xnano-core

      - name: build wasm wheel
        working-directory: xnano-core
        env:
          RUSTUP_TOOLCHAIN: ${{ env.RUST_TOOLCHAIN }}
        run: >-
          pyodide build -o dist
          -C build-args="--no-default-features --features editor"

      - run: pip install -U twine

      - name: check wheels
        working-directory: xnano-core
        run: twine check --strict dist/*

      - uses: actions/upload-artifact@v5
        with:
          name: pypi_files_xnano_core_wasm_emscripten
          path: xnano-core/dist

  test-xnano-core-wasm-wheel:
    name: test xnano-core wasm wheel in pyodide
    needs: [resolve-release, build-xnano-core-wasm]
    if: needs.resolve-release.outputs.run_core_pipeline == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: set up python
        uses: actions/setup-python@v6
        with:
          # must match `pyodide config get python_version`
          python-version: "3.14"

      - name: install pyodide-build
        run: pip install pyodide-build

      - name: get dist artifacts
        uses: actions/download-artifact@v6
        with:
          name: pypi_files_xnano_core_wasm_emscripten
          path: dist

      - name: create pyodide virtual environment
        run: pyodide venv .venv-pyodide

      - name: install xnano-core wasm wheel
        run: >-
          .venv-pyodide/bin/pip install xnano-core
          --no-index --no-deps --find-links dist

      - name: import smoke test
        run: .venv-pyodide/bin/python .github/wasm_smoke_test.py

  build-xnano:
    name: build xnano sdist and wheel
    needs: resolve-release
    if: needs.resolve-release.outputs.run_xnano_pipeline == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: install rust stable
        if: needs.resolve-release.outputs.use_workspace_core == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: install uv
        uses: astral-sh/setup-uv@v7

      - name: prepare python environment for PyPI xnano-core
        if: needs.resolve-release.outputs.use_pypi_core == 'true'
        run: uv sync --group dev --no-install-project

      - name: build xnano against workspace xnano-core
        if: needs.resolve-release.outputs.use_workspace_core == 'true'
        run: |
          uv sync --group dev
          cd xnano-core
          uv run maturin develop --uv

      - name: install xnano-core from PyPI
        if: needs.resolve-release.outputs.use_pypi_core == 'true'
        run: >-
          uv pip install
          "xnano-core==${{ needs.resolve-release.outputs.pinned_core_version }}"

      - name: build distributions
        run: |
          if [[ "${{ needs.resolve-release.outputs.use_pypi_core }}" == "true" ]]; then
            uv build --no-sources --out-dir dist
          else
            uv build --out-dir dist
          fi

      - run: pip install -U twine

      - run: twine check --strict dist/*

      - uses: actions/upload-artifact@v5
        with:
          name: pypi_files_xnano
          path: dist

  release-xnano-core:
    name: release xnano-core
    needs:
      [
        resolve-release,
        test-python,
        test-os,
        build-xnano-core-sdist,
        build-xnano-core-wheels,
        build-xnano-core-wasm,
        test-xnano-core-wheel-install,
        test-xnano-core-wasm-wheel,
      ]
    if: >-
      needs.resolve-release.outputs.should_publish_core == 'true' &&
      (needs.test-python.result == 'success' || needs.test-python.result == 'skipped') &&
      (needs.test-os.result == 'success' || needs.test-os.result == 'skipped') &&
      (needs.build-xnano-core-sdist.result == 'success' || needs.build-xnano-core-sdist.result == 'skipped') &&
      (needs.build-xnano-core-wheels.result == 'success' || needs.build-xnano-core-wheels.result == 'skipped') &&
      (needs.build-xnano-core-wasm.result == 'success' || needs.build-xnano-core-wasm.result == 'skipped') &&
      (needs.test-xnano-core-wheel-install.result == 'success' || needs.test-xnano-core-wheel-install.result == 'skipped') &&
      (needs.test-xnano-core-wasm-wheel.result == 'success' || needs.test-xnano-core-wasm-wheel.result == 'skipped')
    runs-on: ubuntu-latest

    environment:
      name: release

    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7

      - name: check package version
        run: python3 .github/check_version.py

      - name: confirm version is not already on PyPI
        run: python3 .github/confirm_not_on_pypi.py xnano-core
        env:
          TAG_VERSION: ${{ needs.resolve-release.outputs.tag_version }}

      - name: get dist artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: pypi_files_xnano_core_*
          merge-multiple: true
          path: dist

      - name: test wheels integrity
        run: for whl in dist/*.whl; do unzip -qt "$whl"; done

      - run: mkdir -p xnano-core/dist && cp dist/* xnano-core/dist/

      - name: publish to PyPI
        working-directory: xnano-core
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish

      - name: create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: xnano-core ${{ needs.resolve-release.outputs.tag_version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*

  release-xnano:
    name: release xnano
    needs: [resolve-release, test-python, test-os, build-xnano]
    if: >-
      needs.resolve-release.outputs.should_publish_xnano == 'true' &&
      (needs.test-python.result == 'success' || needs.test-python.result == 'skipped') &&
      (needs.test-os.result == 'success' || needs.test-os.result == 'skipped') &&
      (needs.build-xnano.result == 'success' || needs.build-xnano.result == 'skipped')
    runs-on: ubuntu-latest

    environment:
      name: release

    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7

      - name: prepare python environment
        run: uv sync --group dev --no-install-project

      - name: check package version
        run: python3 .github/check_version.py

      - name: verify pinned xnano-core is on PyPI
        run: >-
          uv pip install
          "xnano-core==${{ needs.resolve-release.outputs.pinned_core_version }}"

      - name: confirm version is not already on PyPI
        run: python3 .github/confirm_not_on_pypi.py xnano
        env:
          TAG_VERSION: ${{ needs.resolve-release.outputs.tag_version }}

      - name: get dist artifacts
        uses: actions/download-artifact@v6
        with:
          name: pypi_files_xnano
          path: dist

      - name: test wheels integrity
        run: for whl in dist/*.whl; do unzip -qt "$whl"; done

      - name: publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish

      - name: create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: xnano ${{ needs.resolve-release.outputs.tag_version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*
