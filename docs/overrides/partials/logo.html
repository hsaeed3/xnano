<a href="{{ config.extra.homepage | default(nav.homepage.url | url) }}" title="{{ config.site_name | e }}" class="md-header__button md-logo" aria-label="{{ config.site_name }}" data-md-component="logo">
  <!-- Light theme logo -->
  <div class="zyx-nav-logo-wrapper logo-light">
    <img src="{{ 'assets/zyx-light.png' | url }}" class="zyx-nav-logo-image" alt="logo">
    <canvas class="zyx-nav-logo-gradient"></canvas>
    <canvas class="zyx-nav-logo-grain"></canvas>
  </div>
  <!-- Dark theme logo -->
  <div class="zyx-nav-logo-wrapper logo-dark">
    <img src="{{ 'assets/zyx-dark.png' | url }}" class="zyx-nav-logo-image" alt="logo">
    <canvas class="zyx-nav-logo-gradient"></canvas>
    <canvas class="zyx-nav-logo-grain"></canvas>
  </div>
</a>
